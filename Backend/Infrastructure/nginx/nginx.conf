events {}

http {
  server {
    listen 80;

    location / {
      root /var/www/frontend/dist;  # Angular build
      try_files $uri $uri/ /index.html;
    }

    location /api/ {
      proxy_pass http://backend:8000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # RTSP proxy via RTMP module if needed (add rtmp module to nginx image)
    rtmp {
      server {
        listen 1935;
        application live {
          live on;
          record off;
        }
      }
    }
  }
}
