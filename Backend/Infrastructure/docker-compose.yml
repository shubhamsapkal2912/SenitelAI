version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8554:8554"  # RTSP proxy if needed
    volumes:
      - ./Infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Frontend:/var/www/frontend:ro  # Build output
      - ./Backend:/var/www/backend:ro   # Django static
    depends_on:
      - backend
      - frontend

  backend:
    build: ./Backend
    volumes:
      - ./Backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=SenitelAI.settings
    depends_on:
      - rabbitmq
      - db  # Assume PostgreSQL
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./Frontend
    volumes:
      - ./Frontend:/app
    command: ng serve --host 0.0.0.0 --port 4200

  stream-parser:
    build: ./Stream-Parser
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    command: ./stream-parser -rtsp rtsp://your-camera-ip:554/stream

  celery:
    build: ./Workers
    command: celery -A celery_app worker --loglevel=info
    volumes:
      - ./Workers:/app
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - redis  # For Celery results

  redis:
    image: redis:alpine

volumes:
  rabbitmq_data:
